<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | QODEX</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
    <div class="admin-container">
        <h1>Admin Panel</h1>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Balance</th>
                    <th>Wallet Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user[0] }}</td>  <!-- user_id -->
                    <td>{{ user[1] }}</td>  <!-- balance -->
                    <td>{{ user[2] if user[2] else "Not linked" }}</td>  <!-- wallet_address -->
                    <td>
                        <button class="delete-btn" data-id="{{ user[0] }}">Delete</button>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4">No users found</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
