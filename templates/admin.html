<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
</head>
<body>
    <h1>Admin Panel</h1>
    <table>
        <tr>
            <th>Username</th>
            <th>Balance</th>
        </tr>
        {% for user, data in users.items() %}
        <tr>
            <td>{{ user }}</td>
            <td>{{ data.balance }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
