<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet | QODEX</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/wallet.css') }}">
</head>

<body>

    <div class="wallet-container">
        <h1 class="wallet-title">QODEX Wallet</h1>

        <!-- User Balance -->
        <div class="balance-box">
            <h2>Balance:</h2>
            <span id="balance">{{ balance }}</span> <strong>QDX</strong>
        </div>

        <!-- Wallet Connection Section -->
        <div id="wallet-section">
            <p><strong>Wallet Address:</strong> <span id="wallet-address">Coming Soon...</span></p>
        </div>

        <!-- Coming Soon Message -->
        <p class="coming-soon">Wallet connection will be available soon...</p>

    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="/" class="nav-btn">Home</a>
        <a href="/earn" class="nav-btn">Earn</a>
        <a href="/wallet" class="nav-btn active">Wallet</a>
    </div>

</body>
</html>
